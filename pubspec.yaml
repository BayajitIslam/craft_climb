name: craft_climb
description: "CraftClimb is an AI-powered mobile platform connecting the construction & trade industry. Employers post jobs, career seekers apply, trainers publish courses, and trade workers grow — all in one app with chat, forum & tools marketplace."

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
